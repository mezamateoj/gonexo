name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      back: ${{ steps.filter.outputs.back }}
      front: ${{ steps.filter.outputs.front }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            back:
              - apps/back/**
              - package.json
              - pnpm-lock.yaml
              - pnpm-workspace.yaml
              - .github/workflows/ci.yml
            front:
              - apps/front/**
              - package.json
              - pnpm-lock.yaml
              - pnpm-workspace.yaml
              - .github/workflows/ci.yml

  check-back:
    name: Check Back
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.back == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck back
        run: pnpm --filter @gonexo/back typecheck:ci

      - name: Lint back
        run: pnpm --filter @gonexo/back lint

      - name: Validate back deploy
        run: pnpm --dir apps/back exec wrangler deploy --dry-run

  check-front:
    name: Check Front
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.front == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck front
        run: pnpm --filter @gonexo/front typecheck:ci

      - name: Lint front
        run: pnpm --filter @gonexo/front lint

      - name: Build front
        run: pnpm --filter @gonexo/front build

      - name: Validate front deploy
        run: pnpm --dir apps/front exec wrangler deploy --dry-run
